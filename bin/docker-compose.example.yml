services:
  mongodb:
    image: mongo:latest
    container_name: mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
    networks:
      timetracking_net:
        ipv4_address: 172.28.0.10

  mqtt-listener:
    build:
      context: ./MQTTService
      dockerfile: dockerfile
    container_name: mqtt-listener
    depends_on:
      - mongodb
    environment:
      - MONGO_URI=${MONGO_URI}
      - MONGO_HOST=${MONGO_HOST}
      - MONGO_PORT=${MONGO_PORT}
      - MONGO_DB_NAME=${MONGO_DB_NAME}
      - MONGO_COLLECTION_NAME=${MONGO_COLLECTION_NAME}
      - MQTT_BROKER=${MQTT_BROKER}
      - MQTT_PORT=${MQTT_PORT}
      - MQTT_TOPIC=${MQTT_TOPIC}
      - MQTT_STATS_TOPIC=${MQTT_STATS_TOPIC}
      - MQTT_PUB_TOPIC=${MQTT_PUB_TOPIC}
      - MQTT_USERNAME=${MQTT_USERNAME}
      - MQTT_PASSWORD=${MQTT_PASSWORD}
      - BACKEND_API=${BACKEND_API}
      - INTERNAL_API_KEY=${INTERNAL_API_KEY}
      - INTERNAL_TRUSTED_SUBNETS=${INTERNAL_TRUSTED_SUBNETS}
      - MQTT_LOG_PAYLOADS=${MQTT_LOG_PAYLOADS}
    volumes:
      - ./logs:/opt/loxberry/log/plugins/timetrackingplugin
    networks:
      timetracking_net:
        ipv4_address: 172.28.0.20

  backend:
    build:
      context: ./backend
      dockerfile: dockerfile
    container_name: backend
    depends_on:
      - mongodb
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=${MONGO_URI}
      - SECRET_KEY=${SECRET_KEY}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - INTERNAL_API_KEY=${INTERNAL_API_KEY}
      - INTERNAL_TRUSTED_SUBNETS=${INTERNAL_TRUSTED_SUBNETS}
      - FLASK_DEBUG=${FLASK_DEBUG}
      - DOCKER_ENV=${DOCKER_ENV}
    volumes:
      - ./logs:/app/logs
    networks:
      timetracking_net:
        ipv4_address: 172.28.0.15
    restart: unless-stopped

  webapp:
    build:
      context: ./Webapp
      dockerfile: dockerfile
    container_name: webapp
    environment:
      - URI=${WEBAPP_BACKEND_URI}
    depends_on:
      - mongodb
      - backend
    ports:
      - "80:80"
    networks:
      timetracking_net:
        ipv4_address: 172.28.0.30
    restart: unless-stopped

volumes:
  mongodb_data:

networks:
  timetracking_net:
    ipam:
      config:
        - subnet: 172.28.0.0/16
