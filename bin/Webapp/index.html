<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>TimeTracking Login</title>
    <link rel="icon" type="image/svg+xml" href="images/timetracking-favicon.svg">
    <link rel="shortcut icon" href="images/timetracking-favicon.svg">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/typography.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/timetracking-ui.css">
    <style>
        #loading {
            display: none !important;
        }
    </style>
</head>

<body class="tt-login-body">
    <main class="tt-login-shell">
        <section class="tt-login-card">
            <div class="tt-login-header">
                <span class="tt-login-kicker">Tijdsregistratie Plugin</span>
                <h1>Welkom terug</h1>
                <p>Meld je aan om je uren, badges en timesheets te bekijken.</p>
            </div>

            <form id="loginForm" class="tt-login-form">
                <div class="form-group">
                    <input type="text" class="form-control tt-login-input" id="username" placeholder="Login of e-mail" required>
                </div>
                <div class="form-group">
                    <input type="password" class="form-control tt-login-input" id="password" placeholder="Wachtwoord" required>
                </div>
                <button type="submit" class="tt-login-button">Inloggen</button>
                <div id="loginError" class="login-error" role="alert"></div>
            </form>
        </section>
    </main>

    <script src="js/jquery.min.js"></script>
    <script src="js/popper.min.js"></script>
    <script src="js/bootstrap.min.js"></script>
    <script src="js/custom.js"></script>
    <script src="js/login.js"></script>
</body>

</html>
